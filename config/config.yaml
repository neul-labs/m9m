# m9m Configuration File
# This is a template - copy to config/config.yaml and customize

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8080
  # Enable HTTPS
  tls:
    enabled: false
    cert_file: "/app/config/tls/cert.pem"
    key_file: "/app/config/tls/key.pem"

# Database Configuration
database:
  # Supported types: postgres, mysql, sqlite, mongodb
  type: "postgres"

  postgres:
    host: "localhost"
    port: 5432
    database: "n8n"
    user: "n8n"
    password: "changeme"
    ssl_mode: "disable"
    max_connections: 25
    max_idle_connections: 5
    connection_lifetime: "5m"

  mysql:
    host: "localhost"
    port: 3306
    database: "n8n"
    user: "n8n"
    password: "changeme"
    charset: "utf8mb4"
    max_connections: 25

  sqlite:
    path: "/app/data/n8n.db"

  mongodb:
    url: "mongodb://localhost:27017/n8n"
    database: "n8n"

# Queue Configuration
queue:
  # Supported types: memory, redis, rabbitmq
  type: "redis"

  # Number of concurrent workflow executions
  max_workers: 10

  redis:
    url: "redis://localhost:6379"
    password: ""
    db: 0
    key_prefix: "n8n:"

  rabbitmq:
    url: "amqp://guest:guest@localhost:5672/"
    exchange: "n8n"
    queue: "workflows"
    durable: true

# Logging Configuration
logging:
  level: "info"  # trace, debug, info, warn, error
  format: "json"  # json or text
  output: "stdout"  # stdout, stderr, or file path
  file:
    path: "/app/logs/m9m.log"
    max_size: 100  # MB
    max_backups: 3
    max_age: 28  # days
    compress: true

# Monitoring & Observability
monitoring:
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"

  tracing:
    enabled: false
    provider: "jaeger"  # jaeger, zipkin, otlp
    jaeger:
      endpoint: "http://localhost:14268/api/traces"
    zipkin:
      endpoint: "http://localhost:9411/api/v2/spans"
    otlp:
      endpoint: "localhost:4317"
      insecure: true

  health_check:
    enabled: true
    path: "/health"

# Security Configuration
security:
  # Basic authentication
  basic_auth:
    enabled: false
    username: "admin"
    password: "changeme"

  # JWT authentication
  jwt:
    enabled: true
    secret: "change-this-to-a-random-secret"
    expiration: "24h"

  # API keys
  api_keys:
    enabled: true

  # CORS settings
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:5678"
      - "http://localhost:3000"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
    allowed_headers:
      - "Content-Type"
      - "Authorization"
    allow_credentials: true

# Workflow Execution
execution:
  # Timeout for workflow execution (0 = no timeout)
  timeout: "1h"

  # Max execution data size (MB)
  max_data_size: 100

  # Save execution data
  save_data:
    on_success: "all"  # all, none, last
    on_error: "all"
    manual_executions: true

  # Retry configuration
  retry:
    enabled: true
    max_attempts: 3
    backoff: "exponential"  # linear, exponential
    initial_interval: "1s"
    max_interval: "5m"

# Credentials Management
credentials:
  # Encryption key for storing credentials
  encryption_key: "change-this-to-a-random-key-min-32-chars"

  # Storage backend
  storage: "database"  # database, vault

  # HashiCorp Vault integration
  vault:
    enabled: false
    address: "http://localhost:8200"
    token: ""
    mount_path: "secret"

# n8n Frontend Compatibility
compatibility:
  # Enable n8n API compatibility mode
  enabled: true

  # API version to emulate
  api_version: "v1"

  # Workflow format
  workflow_format: "n8n"  # n8n, native

  # Expression syntax
  expression_syntax: "n8n"  # n8n, native

# Templates & Marketplace
templates:
  enabled: true
  cache_dir: "/app/data/templates"
  marketplace:
    enabled: true
    url: "https://api.n8n.io/templates"
    sync_interval: "24h"

# Email Configuration (for SMTP node and notifications)
email:
  smtp:
    host: "smtp.example.com"
    port: 587
    user: ""
    password: ""
    from: "noreply@example.com"
    use_tls: true

# External Services Configuration
external_services:
  # AI/LLM Services
  openai:
    api_key: ""
    default_model: "gpt-4"

  anthropic:
    api_key: ""
    default_model: "claude-3-sonnet-20240229"

  # Cloud Providers
  aws:
    access_key_id: ""
    secret_access_key: ""
    region: "us-east-1"

  azure:
    subscription_id: ""
    tenant_id: ""
    client_id: ""
    client_secret: ""

  gcp:
    project_id: ""
    credentials_file: "/app/config/gcp-credentials.json"

# Performance Tuning
performance:
  # Enable caching
  cache:
    enabled: true
    backend: "redis"  # memory, redis
    ttl: "5m"

  # Connection pooling
  connection_pool:
    max_idle: 10
    max_open: 100
    max_lifetime: "1h"

  # Request rate limiting
  rate_limit:
    enabled: false
    requests_per_minute: 60
    burst: 10

# Development Settings
development:
  # Enable debug mode
  debug: false

  # Enable profiling
  pprof:
    enabled: false
    port: 6060

  # Hot reload
  hot_reload: false

  # Verbose logging
  verbose: false

# Feature Flags
features:
  # Enable experimental features
  experimental: false

  # Enable specific features
  enable_python_runtime: true
  enable_javascript_runtime: true
  enable_workflow_versioning: true
  enable_collaboration: false
  enable_audit_log: true
