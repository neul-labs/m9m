name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GO_VERSION: '1.24'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.3.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this release
            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Docker
            ```bash
            docker pull neul-labs/m9m:${{ steps.get_version.outputs.version }}
            ```

            ### Binary
            Download the binary for your platform below.

            ### From Source
            ```bash
            git clone https://github.com/neul-labs/m9m.git
            cd m9m
            git checkout v${{ steps.get_version.outputs.version }}
            make build
            ```

            ## Checksums
            See checksums.txt
          draft: false
          prerelease: false

  build-release:
    name: Build Release Binaries
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: m9m-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: m9m-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: m9m-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: m9m-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: m9m-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          COMMIT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          go build -trimpath -ldflags="-w -s -X main.Version=${{ needs.release.outputs.version }} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}" -o ${{ matrix.artifact_name }} ./cmd/m9m
        shell: bash

      - name: Generate checksum
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          fi
        shell: bash

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/octet-stream

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./${{ matrix.artifact_name }}.sha256
          asset_name: ${{ matrix.artifact_name }}.sha256
          asset_content_type: text/plain

  docker-release:
    name: Build and Push Docker Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            neul-labs/m9m
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.release.outputs.version }}

  homebrew:
    name: Update Homebrew Formula
    needs: [release, build-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@v4
        with:
          repository: dipankar/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ needs.release.outputs.version }}
          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/m9m.rb
          sed -i "s|https://github.com/neul-labs/m9m/releases/download/v[^/\\\"]*/m9m-darwin-amd64|https://github.com/neul-labs/m9m/releases/download/v$VERSION/m9m-darwin-amd64|g" Formula/m9m.rb
          sed -i "s|https://github.com/neul-labs/m9m/releases/download/v[^/\\\"]*/m9m-darwin-arm64|https://github.com/neul-labs/m9m/releases/download/v$VERSION/m9m-darwin-arm64|g" Formula/m9m.rb

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/m9m.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi
          git commit -m "Update m9m to v${{ needs.release.outputs.version }}"
          git push
