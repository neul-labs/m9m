  - Getting Started:
    - Introduction: getting-started/introduction.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Your First Workflow: getting-started/first-workflow.md
  - User Guide:
    - Workflows: user-guide/workflows.md
    - Expressions: user-guide/expressions.md
    - Credentials: user-guide/credentials.md
    - Variables & Environments: user-guide/variables.md
    - Error Handling: user-guide/error-handling.md
  - Nodes:
    - Overview: nodes/overview.md
    - Transform Nodes: nodes/transform.md
    - Trigger Nodes: nodes/triggers.md
    - Database Nodes: nodes/databases.md
    - HTTP & API Nodes: nodes/http.md
    - AI Nodes: nodes/ai.md
    - Cloud Nodes: nodes/cloud.md
    - Creating Custom Nodes: nodes/custom-nodes.md
  - API Reference:
    - REST API: api/rest-api.md
    - Endpoints: api/endpoints.md
    - Authentication: api/authentication.md
    - Webhooks: api/webhooks.md
  - Deployment:
    - Overview: deployment/overview.md
    - Docker: deployment/docker.md
    - Kubernetes: deployment/kubernetes.md
    - Production: deployment/production.md
    - Scaling: deployment/scaling.md
  - Reference:
    - Configuration: reference/configuration.md
    - CLI Commands: reference/cli.md
    - Migration from n8n: reference/migration.md
    - Troubleshooting: reference/troubleshooting.md

